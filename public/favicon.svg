<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Audio Normalizer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1c32"/>
      <stop offset="1" stop-color="#091428"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c9984d"/>
      <stop offset="1" stop-color="#e8b06a"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Loudness bars -->
  <g fill="url(#fg)">
    <rect x="6"  y="13" width="2.6" height="6"  rx="1.3"/>
    <rect x="10" y="9"  width="2.6" height="14" rx="1.3"/>
    <rect x="14" y="6"  width="2.6" height="20" rx="1.3"/>
    <rect x="18" y="10" width="2.6" height="12" rx="1.3"/>
    <rect x="22" y="14" width="2.6" height="4"  rx="1.3"/>
  </g>
</svg>
